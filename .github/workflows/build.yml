name: Build & Publish Voice PE

on:
  push:
    tags:
      - '25.*'          # każde tagowanie 25.x.y odpala build

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}       # np. 25.6.0
      DEVICE: home-assistant-voice          # nazwa w katalogu firmware
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python + ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade esphome            

      - name: Compile factory & OTA
        run: |
          esphome compile home-assistant-voice.factory.yaml
          esphome compile home-assistant-voice.yaml

      - name: Prepare docs/ structure
        run: |
          mkdir -p docs/firmware/$DEVICE/$VERSION
          cp build/$DEVICE/*.factory.bin docs/firmware/$DEVICE/$VERSION/
          cp build/$DEVICE/*.ota.bin      docs/firmware/$DEVICE/$VERSION/

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum docs/firmware/$DEVICE/$VERSION/*.ota.bin | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Generate manifest.json
        run: |
          cat > docs/firmware/$DEVICE/manifest.json <<EOF
          {
            "name": "Home Assistant Voice PE - Hey Version",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "new_install_prompt_erase": false,
            "builds": [{
              "chipFamily": "ESP32-S3",
              "parts": [{
                "path": "${VERSION}/home-assistant-voice-esp32s3.factory.bin",
                "offset": 0
              }],
              "ota": {
                "path": "${VERSION}/home-assistant-voice-esp32s3.ota.bin",
                "sha256": "${{ steps.sha.outputs.sha }}",
                "type": "esphome"
              }
            }]
          }
          EOF

      - name: Commit pages artefacts
        run: |
          git config --global user.name  "github-actions"
          git config --global user.email "actions@users.noreply.github.com"
          git add docs/
          git commit -m "Publish firmware ${VERSION}" || echo "No changes"
          git push
